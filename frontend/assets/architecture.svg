  <text x="160" y="129" text-anchor="middle" fill="#8A8498" font-size="10" letter-spacing="2">AGENT SUBMISSION</text>

  <text x="60" y="160" fill="#F0EAFF" font-size="12" font-weight="500">Any AI agent</text>
  <text x="60" y="180" fill="#5A5466" font-size="10">Chatbot, trading bot, code assistant,</text>
  <text x="60" y="194" fill="#5A5466" font-size="10">crypto agent, marketing tool...</text>

  <text x="60" y="220" fill="#8A8498" font-size="10" letter-spacing="1">IDENTIFIER</text>
  <text x="60" y="238" fill="#5A5466" font-size="10">0x address / GitHub repo / API URL</text>

