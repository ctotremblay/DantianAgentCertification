<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Dantian</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #F0EAFF;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 6rem;
      font-weight: 700;
      letter-spacing: 8px;
      opacity: 0.15;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    p {
      color: rgba(240, 234, 255, 0.4);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 1px;
      margin-bottom: 2.5rem;
    }
    a {
      color: rgba(240, 234, 255, 0.6);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid rgba(240, 234, 255, 0.08);
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      transition: color 0.3s, border-color 0.3s;
    }
    a:hover {
      color: #F0EAFF;
      border-color: rgba(240, 234, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Signal not found</h1>
  <p>This path does not resolve.</p>
  <a href="/">Return to origin</a>
</body>
</html>
